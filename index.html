<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>keep-your-light</title>
  </head>
  <body>
    <div id="app">
      <main class="page">
        <header class="intro">
          <h1>Keep your light</h1>
          <p>When the day feels too heavy</p>
        </header>

        <section class="scene-and-copy" aria-label="Main message">
          <div class="scene">
            <video
              class="scene__video"
              autoplay
              muted
              loop
              playsinline
              preload="metadata"
            >
              <source src="/medieval-knight.webm" type="video/webm" />
              <source src="/medieval-knight.mp4" type="video/mp4" />
            </video>
          </div>

          <p class="mantra" id="mantra">
            you don't need meaning right now, just endurance
          </p>
        </section>

        <section class="actions" aria-label="Support anchors">
          <button class="action-card" type="button" data-category="help">
            <h2>Help</h2>
            <p>I just can't anymore</p>
          </button>

          <button class="action-card" type="button" data-category="perspective">
            <h2>Perspective</h2>
            <p>I can't find meaning in this</p>
          </button>

          <button class="action-card" type="button" data-category="momentum">
            <h2>Momentum</h2>
            <p>I just need to keep moving</p>
          </button>

          <button class="action-card" type="button" data-category="done">
            <h2>Done</h2>
            <p>I survived</p>
          </button>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
