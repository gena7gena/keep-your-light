<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>keep-your-light</title>
  </head>
  <body>
    <div id="app">
      <main class="page">
        <header class="intro">
          <div class="intro__copy">
            <h1>Keep your light</h1>
            <p>When the day feels too heavy</p>
          </div>
        </header>

        <section class="scene-and-copy" aria-label="Main message">
          <div class="scene">
            <video
              id="scene-video"
              class="scene__video"
              autoplay
              loop
              playsinline
              preload="metadata"
            >
              <source src="/medieval-knight.webm" type="video/webm" />
              <source src="/medieval-knight.mp4" type="video/mp4" />
            </video>

            <div class="scene-controls" id="scene-controls" aria-label="Scene controls">
              <div class="volume-control">
                <button
                  type="button"
                  class="scene-control-button"
                  id="volume-toggle"
                  aria-label="Mute sound"
                  aria-pressed="false"
                >
                  <svg
                    class="icon-volume-on"
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                  >
                    <path
                      d="M5 9v6h4l5 4V5L9 9H5Zm12.5 3a4.5 4.5 0 0 0-2.1-3.8v7.6a4.5 4.5 0 0 0 2.1-3.8Zm0-7a1 1 0 1 0-1 1 6.5 6.5 0 0 1 0 13 1 1 0 1 0 0 2 8.5 8.5 0 0 0 0-17Z"
                      fill="currentColor"
                    />
                  </svg>
                  <svg
                    class="icon-volume-off"
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                  >
                    <path
                      d="M5 9v6h4l5 4V5L9 9H5Zm14.7.3a1 1 0 0 0-1.4-1.4L16 10.2l-2.3-2.3a1 1 0 0 0-1.4 1.4l2.3 2.3-2.3 2.3a1 1 0 1 0 1.4 1.4l2.3-2.3 2.3 2.3a1 1 0 1 0 1.4-1.4L17.4 12l2.3-2.3Z"
                      fill="currentColor"
                    />
                  </svg>
                </button>
                <label class="volume-slider-wrap" for="volume-slider">
                  <span class="sr-only">Volume</span>
                  <input
                    id="volume-slider"
                    class="volume-slider"
                    type="range"
                    min="0"
                    max="1"
                    step="0.01"
                    value="0.55"
                    aria-label="Volume"
                  />
                </label>
              </div>

              <button
                type="button"
                class="scene-control-button"
                id="fullscreen-toggle"
                aria-label="Enter fullscreen"
                aria-pressed="false"
              >
                <svg class="icon-fullscreen-enter" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M4 10a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a1 1 0 1 1 0 2H5v4a1 1 0 0 1-1 1Zm16 0a1 1 0 0 1-1-1V5h-4a1 1 0 1 1 0-2h5a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1ZM9 21H4a1 1 0 0 1-1-1v-5a1 1 0 1 1 2 0v4h4a1 1 0 1 1 0 2Zm11 0h-5a1 1 0 1 1 0-2h4v-4a1 1 0 1 1 2 0v5a1 1 0 0 1-1 1Z"
                    fill="currentColor"
                  />
                </svg>
                <svg class="icon-fullscreen-exit" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M9 10H4a1 1 0 1 1 0-2h4V4a1 1 0 1 1 2 0v5a1 1 0 0 1-1 1Zm11 0h-5a1 1 0 0 1-1-1V4a1 1 0 1 1 2 0v4h4a1 1 0 1 1 0 2ZM9 21a1 1 0 0 1-1-1v-4H4a1 1 0 1 1 0-2h5a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1Zm11 0a1 1 0 0 1-1-1v-5a1 1 0 0 1 1-1h5a1 1 0 1 1 0 2h-4v4a1 1 0 0 1-1 1Z"
                    fill="currentColor"
                  />
                </svg>
              </button>
            </div>
          </div>

          <p class="mantra" id="mantra">
            <span class="mantra__text">
              you don't need meaning right now, just endurance
            </span>
          </p>
        </section>

        <section class="actions" aria-label="Support anchors">
          <button class="action-card" type="button" data-category="help">
            <h2>Help</h2>
            <p>I just can't anymore</p>
          </button>

          <button class="action-card" type="button" data-category="perspective">
            <h2>Perspective</h2>
            <p>I can't find meaning in this</p>
          </button>

          <button class="action-card" type="button" data-category="momentum">
            <h2>Momentum</h2>
            <p>I just need to keep moving</p>
          </button>

          <button
            class="action-card action-card--done"
            id="done-trigger"
            type="button"
          >
            <h2>Done</h2>
            <p>I survived</p>
          </button>
        </section>
      </main>

      <section
        class="completion-screen"
        id="completion-screen"
        aria-hidden="true"
      >
        <p class="completion-screen__quote" id="completion-quote"></p>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
